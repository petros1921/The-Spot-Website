<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Spot Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Montserrat',sans-serif; background:#0b0b0b; color:#f5f5f5; }

    /* ── Login Page (full screen) ── */
    .login-page {
      position: fixed; inset: 0; background: radial-gradient(circle at 20% 50%, #1a1a1a, #0b0b0b);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .login-card {
      background: rgba(26,26,26,0.8); backdrop-filter: blur(20px);
      border: 1px solid #c9922a40; border-radius: 30px; padding: 50px 40px;
      text-align: center; width: 100%; max-width: 420px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .login-card .logo {
      font-family: 'Cinzel', serif; font-size: 2.2rem; color: #c9922a; margin-bottom: 10px;
    }
    .login-card p { color: #aaa; margin-bottom: 30px; font-size: 0.9rem; }
    .login-card input {
      width: 100%; background: #111; border: 1px solid #2a2a2a; border-radius: 12px;
      padding: 14px 18px; color: #f0e6d3; font-size: 0.95rem; margin-bottom: 15px;
      outline: none; transition: border-color 0.3s;
    }
    .login-card input:focus { border-color: #c9922a; }
    .login-btn {
      background: #c9922a; color: #0b0b0b; border: none; border-radius: 30px;
      padding: 14px; font-weight: 600; width: 100%; cursor: pointer; transition: 0.3s;
      font-size: 1rem; letter-spacing: 1px;
    }
    .login-btn:hover { background: #e0b84d; }
    .error-msg { color: #f44336; margin-top: 10px; font-size: 0.9rem; }

    /* ── Dashboard layout (hidden until login) ── */
    .dashboard { display: none; height: 100vh; }
    .sidebar {
      width: 250px; background: #111; border-right: 1px solid #2a2a2a;
      padding: 30px 20px; display: flex; flex-direction: column; gap: 30px;
      position: fixed; top:0; left:0; bottom:0; z-index:10;
    }
    .sidebar h2 { font-family:'Cinzel',serif; color:#c9922a; font-size:1.5rem; }
    .nav-item {
      padding: 12px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s;
      display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: #aaa;
    }
    .nav-item i { width: 20px; }
    .nav-item.active { background: #c9922a; color: #0b0b0b; font-weight: 600; }
    .nav-item:hover:not(.active) { background: #1e1e1e; color: #ddd; }
    .logout-btn {
      background: transparent; border: 1px solid #c9922a; color: #c9922a;
      padding: 10px; border-radius: 30px; cursor: pointer; font-weight: 600;
      margin-top: auto; transition: 0.3s;
    }
    .logout-btn:hover { background: #c9922a; color: #0b0b0b; }

    .main {
      margin-left: 250px; padding: 30px; overflow-y: auto; height: 100vh;
    }
    .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap:15px; margin-bottom:30px; }
    .stat-card {
      background: #1a1a1a; border: 1px solid #2a2010; border-radius: 20px;
      padding: 20px; text-align: center;
    }
    .stat-card h3 { font-size: 2rem; color: #c9922a; margin-bottom: 5px; }
    .stat-card p { font-size: 0.8rem; color: #aaa; }
    .toolbar { display: flex; gap:15px; margin-bottom:20px; flex-wrap:wrap; }
    .toolbar input, .toolbar select {
      background: #111; border: 1px solid #2a2a2a; border-radius: 12px;
      padding: 10px 15px; color: #f0e6d3; font-size: 0.9rem;
    }
    .toolbar input { flex:1; min-width:200px; }
    .table-wrapper { background: #1a1a1a; border-radius: 20px; border:1px solid #2a2010; overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    th { background:#111; color:#c9922a; font-family:'Cinzel',serif; font-size:0.85rem; padding:15px; text-align:left; }
    td { padding:12px 15px; border-bottom:1px solid #2a2a2a; font-size:0.85rem; }
    tr:last-child td { border-bottom:none; }
    .badge {
      display:inline-block; padding:4px 10px; border-radius:20px; font-size:0.75rem; font-weight:600;
    }
    .badge-confirmed { background:#2e7d32; color:#fff; }
    .badge-unconfirmed { background:#f9a825; color:#000; }
    .badge-completed { background:#1565c0; color:#fff; }   /* ← new */
    .badge-ordered { background:#2e7d32; color:#fff; }
    .badge-unordered { background:#f9a825; color:#000; }
    .action-btn {
      padding:6px 14px; border:1px solid #c9922a; background:transparent; color:#c9922a;
      border-radius:20px; cursor:pointer; font-size:0.75rem; transition:0.3s;
    }
    .action-btn:hover { background:#c9922a; color:#0b0b0b; }
  </style>
</head>
<body>
  <!-- ── Login Page ── -->
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <div class="logo">The Spot</div>
      <p>Admin Dashboard</p>
      <input type="email" id="loginEmail" placeholder="Email" />
      <input type="password" id="loginPassword" placeholder="Password" />
      <button class="login-btn" id="loginBtn">Log In</button>
      <div class="error-msg" id="loginError"></div>
    </div>
  </div>

  <!-- ── Dashboard (hidden) ── -->
  <div id="dashboardContainer" class="dashboard">
    <aside class="sidebar">
      <h2>The Spot</h2>
      <nav>
        <div class="nav-item active" data-table="reservations"><i class="fas fa-calendar-alt"></i> Reservations</div>
        <div class="nav-item" data-table="preorders"><i class="fas fa-shopping-bag"></i> Preorders</div>
        <div class="nav-item" data-table="feedback"><i class="fas fa-star"></i> Feedback</div>
      </nav>
      <button class="logout-btn" id="logoutBtn">Log Out</button>
    </aside>

    <div class="main">
      <div class="stats" id="statsContainer"></div>
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search by name..." />
        <select id="dateFilter">
          <option value="all">All Dates</option>
          <option value="today">Today</option>
          <option value="week">This Week</option>
        </select>
      </div>
      <div class="table-wrapper" id="tableContainer"></div>
    </div>
  </div>

  <script>
    const idColumn = 'name';   
    const supabaseUrl = 'https://hmmhosnwiccayifrxqps.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtbWhvc253aWNjYXlpZnJ4cXBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2Nzk5NzgsImV4cCI6MjA5NjI1NTk3OH0.RYn8LRQYXZNBzr9oRwQzu9UZbKOjwUAO6wi_vHtfOBY';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
  
    let currentTable = 'reservations';
    let allData = [];
  
    // Auth
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        document.getElementById('loginError').textContent = error.message;
      } else {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboardContainer').style.display = 'flex';
        loadDashboard();
      }
    });
  
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      document.getElementById('dashboardContainer').style.display = 'none';
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPassword').value = '';
    });
  
    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        currentTable = item.dataset.table;
        loadDashboard();
      });
    });
  
    document.getElementById('searchInput').addEventListener('input', renderTable);
    document.getElementById('dateFilter').addEventListener('change', () => loadDashboard());
  
    async function loadDashboard() {
      const { data: session } = await supabaseClient.auth.getSession();
      if (!session) return;
  
      let query = supabaseClient.from(currentTable).select('*').order('created_at', { ascending: false });
  
      const dateFilter = document.getElementById('dateFilter').value;
      const now = new Date();
      const today = now.toISOString().split('T')[0];
      if (currentTable === 'reservations' || currentTable === 'preorders') {
        const dateField = currentTable === 'reservations' ? 'date' : 'pickup_date';
        if (dateFilter === 'today') {
          query = query.eq(dateField, today);
        } else if (dateFilter === 'week') {
          const nextWeek = new Date(now.getTime() + 7*24*60*60*1000).toISOString().split('T')[0];
          query = query.gte(dateField, today).lte(dateField, nextWeek);
        }
      }
  
      const { data, error } = await query;
      if (error) { console.error(error); return; }
      allData = data;
      updateStats(data);
      renderTable();
    }
  
    function updateStats(data) {
      const today = new Date().toISOString().split('T')[0];
      let html = '';
      if (currentTable === 'reservations') {
        const todayCount = data.filter(r => r.date === today).length;
        const unconfirmed = data.filter(r => r.status === 'unconfirmed' || !r.status).length;
        const confirmed = data.filter(r => r.status === 'confirmed').length;
        const completed = data.filter(r => r.status === 'completed').length;
        html = `
          <div class="stat-card"><h3>${todayCount}</h3><p>Today</p></div>
          <div class="stat-card"><h3>${unconfirmed}</h3><p>Unconfirmed</p></div>
          <div class="stat-card"><h3>${confirmed}</h3><p>Confirmed</p></div>
          <div class="stat-card"><h3>${completed}</h3><p>Completed</p></div>
        `;
      } else if (currentTable === 'preorders') {
        // unchanged preorder stats
      } else {
        html = `<div class="stat-card"><h3>${data.length}</h3><p>Total</p></div>`;
      }
      document.getElementById('statsContainer').innerHTML = html;
    }
  
    function renderTable() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      let filtered = allData;
      if (search) {
        filtered = filtered.filter(row => row.name?.toLowerCase().includes(search));
      }
  
      let html = '<table><thead><tr>';
      const headers = {
        reservations: ['Name','Email','Phone','Date','Time','Guests','Message','Status','Action'],
        preorders: ['Name','Email','Phone','Pickup Date','Pickup Time','Order','Message','Status','Action'],
        feedback: ['Name','Email','Rating','Message','Date']
      };
      headers[currentTable].forEach(h => html += `<th>${h}</th>`);
      html += '</tr></thead><tbody>';
  
      if (filtered.length === 0) {
        html += '<tr><td colspan="9" style="text-align:center;padding:40px;">No entries found.</td></tr>';
      } else {
        filtered.forEach(row => {
          const rowId = row[idColumn];
          html += '<tr>';
          if (currentTable === 'reservations') {
            const status = row.status || 'unconfirmed';
            let badgeClass = 'badge-unconfirmed';
            if (status === 'confirmed') badgeClass = 'badge-confirmed';
            else if (status === 'completed') badgeClass = 'badge-completed';
  
            html += `<td>${row.name}</td><td>${row.email}</td><td>${row.phone}</td><td>${row.date}</td><td>${row.time}</td><td>${row.guests}</td><td>${row.message||''}</td>`;
            html += `<td><span class="badge ${badgeClass}">${status}</span></td>`;
            
            // Action buttons based on status
            html += '<td>';
            if (status === 'unconfirmed') {
              html += `<button class="action-btn" data-id="${rowId}" data-new-status="confirmed" data-table="reservations">Confirm</button>`;
            } else if (status === 'confirmed') {
              html += `<button class="action-btn" data-id="${rowId}" data-new-status="completed" data-table="reservations">Complete</button>`;
            } else {
              html += '—';
            }
            html += '</td>';
          }
          else if (currentTable === 'preorders') {
            // unchanged preorders (only ordered/unordered)
            html += `<td>${row.name}</td><td>${row.email}</td><td>${row.phone}</td><td>${row.pickup_date}</td><td>${row.pickup_time}</td><td>${row.order_text}</td><td>${row.message||''}</td>`;
            const status = row.status || 'unordered';
            html += `<td><span class="badge ${status==='ordered'?'badge-ordered':'badge-unordered'}">${status}</span></td>`;
            html += `<td><button class="action-btn" data-id="${rowId}" data-new-status="${status==='ordered'?'unordered':'ordered'}" data-table="preorders">${status==='ordered'?'Unorder':'Mark Ordered'}</button></td>`;
          }
          else {
            html += `<td>${row.name}</td><td>${row.email||''}</td><td>${row.rating||''}</td><td>${row.message||''}</td><td>${new Date(row.created_at).toLocaleDateString()}</td>`;
          }
          html += '</tr>';
        });
      }
      html += '</tbody></table>';
      document.getElementById('tableContainer').innerHTML = html;
  
      // Attach action buttons
      document.querySelectorAll('.action-btn').forEach(btn => {
        btn.addEventListener('click', async function() {
          const idValue = this.dataset.id;
          const newStatus = this.dataset.newStatus;
          const table = this.dataset.table;
  
          this.textContent = '...';
          this.disabled = true;
  
          const { error } = await supabaseClient.from(table)
            .update({ status: newStatus })
            .eq(idColumn, idValue);
  
          if (error) {
            console.error('Update error:', error);
            alert('Update failed: ' + error.message);
            this.disabled = false;
            // Reset button text based on current status (we could leave it)
          } else {
            await loadDashboard();
          }
        });
      });
    }
  </script>
</body>
</html>
